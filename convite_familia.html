<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Convite Família</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <audio id="musica" loop>
    <source src="assets/Bluey Theme Tune - Extended.mp3" type="audio/mpeg">
  </audio>
  <div class="convite">
    <button id="tocar">Abrir Convite</button>
  </div id="conteudo" class="hidden">
  <h1>18 Anos</h1>
  <p>Será uma alegria celebrar esse momento especial com vocês.</p>
  <div class="info">
    <p><strong>Data:</strong> 22 de Agosto de 2026</p>
    <p><strong>Horário:</strong> 15:00</p>
    <p><strong>Local:</strong> Chácara Recanto Audi - Londrina/PR</p>
  </div>
  <a class="maps" href="https://maps.app.goo.gl/vipFYpWqLn95xxjt9" target="_blank">Abrir no Google Maps</a>
  <form id="formFamilia">
    <input type="text" id="nome" placeholder="Seu nome" required>
    <button type="submit">Confirmar Presença</button>
  </form>
  <p id="msg"></p>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script type="module" src="js/convite.js"></script>
</body>
</html>
